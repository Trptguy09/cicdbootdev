name: cd

on: 
  push: 
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
      
      
      - name: Auth check
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        

      - name: Use gcloud CLI
        run: gcloud info
      
      - name: Build for gcloud 
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-490716/notely-ar-repo/notely:latest .

      - name: Migrate DB
        run: npm run db:migrate
      
      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-490716/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-490716 --max-instances=4
